<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contabilidad Privada</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 {
  text-align: center;
}

.container {
  max-width: 500px;
  margin: auto;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

input {
  background: #1e293b;
  color: white;
}

button {
  background: #22c55e;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.item {
  background: #1e293b;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
}

.delete {
  background: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🔐 Mi Contabilidad</h1>

  <input type="text" id="titulo" placeholder="Ej: Neki">
  <input type="number" id="valor" placeholder="Valor">

  <button onclick="guardar()">Guardar</button>

  <div id="lista"></div>
</div>

<script>
// 🔐 Codificación personalizada
function codificar(num) {
  const mapa = {
    "0":"Z","1":"P","2":"Q","3":"R","4":"S",
    "5":"T","6":"U","7":"V","8":"W","9":"X"
  };

  return num.toString().split("").map(n => mapa[n]).join("");
}

// Guardar datos
function guardar() {
  const t = document.getElementById("titulo").value;
  const v = document.getElementById("valor").value;

  if (!t || !v) return alert("Completa todo");

  const data = JSON.parse(localStorage.getItem("data")) || [];

  data.push({
    t: t,
    c: codificar(v) // SOLO guardamos el código visible
  });

  localStorage.setItem("data", JSON.stringify(data));

  document.getElementById("titulo").value = "";
  document.getElementById("valor").value = "";

  cargar();
}

// Cargar lista
function cargar() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const data = JSON.parse(localStorage.getItem("data")) || [];

  data.forEach((d, i) => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <strong>${d.t}</strong><br>
      🔐 ${d.c}
      <button class="delete" onclick="eliminar(${i})">Eliminar</button>
    `;

    lista.appendChild(div);
  });
}

// Eliminar
function eliminar(i) {
  const data = JSON.parse(localStorage.getItem("data")) || [];
  data.splice(i, 1);
  localStorage.setItem("data", JSON.stringify(data));
  cargar();
}

// Iniciar
cargar();
</script>

</body>
</html>
