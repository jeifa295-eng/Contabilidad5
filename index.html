<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContaApp Empresa</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#0f172a;color:white}
.header{padding:20px;text-align:center;background:#1e3a8a}
.card{background:#1e293b;margin:10px;padding:15px;border-radius:15px}
button{padding:6px 10px;border:none;border-radius:8px;margin:3px}
.add{background:#22c55e}.delete{background:#ef4444}.edit{background:#f59e0b}
input{padding:8px;margin:5px;width:90%;border-radius:8px;border:none;background:#334155;color:white}
.hidden{display:none}
.bottom-nav{position:fixed;bottom:0;width:100%;display:flex;background:#020617}
.bottom-nav button{flex:1;background:none;color:#94a3b8;padding:15px}
.bottom-nav button.active{color:white}
.big{font-size:28px;color:#22c55e}
</style>
</head>

<body>

<div class="header">💳 ContaApp Empresa</div>

<!-- LOGIN -->
<div id="login">
<div class="card">
<input id="email" placeholder="Correo">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button onclick="register()">Registrarse</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div id="home">
<div class="card"><div id="total" class="big">$0</div></div>
<div class="card"><canvas id="chart"></canvas></div>
</div>

<div id="cats" class="hidden">
<div class="card">
<input id="catName" placeholder="Categoría">
<input id="catValor" type="number" placeholder="Valor">
<button onclick="addCategory()">Agregar</button>
</div>
<div id="categories"></div>
</div>

<div id="gastos" class="hidden">
<div class="card">
<input id="gNombre"><input id="gValor" type="number">
<button onclick="addGasto()">Agregar</button>
</div>
<ul id="gList"></ul>
</div>

<div class="card">
<button onclick="exportCSV()">📥 Exportar</button>
</div>

<div class="bottom-nav">
<button onclick="nav('home',this)">🏠</button>
<button onclick="nav('cats',this)">📂</button>
<button onclick="nav('gastos',this)">💸</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={
 apiKey:"AIzaSyAvSqCwRrpYz58EksurH-L0P1ny_FmYWq8",
 authDomain:"contabilidad-31cc1.firebaseapp.com",
 projectId:"contabilidad-31cc1"
};

const app=initializeApp(firebaseConfig);
const dbCloud=getFirestore(app);
const auth=getAuth(app);

let userId=null;
let db={cats:[],gastos:[]};

// LOGIN
window.login=async()=>{
 let e=email.value,p=pass.value;
 let u=await signInWithEmailAndPassword(auth,e,p);
 userId=u.user.uid;
 start();
}

window.register=async()=>{
 let e=email.value,p=pass.value;
 let u=await createUserWithEmailAndPassword(auth,e,p);
 userId=u.user.uid;
 start();
}

// INICIO APP
async function start(){
 login.style.display="none";
 app.classList.remove("hidden");

 let snap=await getDoc(doc(dbCloud,"users",userId));
 if(snap.exists()) db=snap.data().data;

 render();
}

// SAVE
async function save(){
 await setDoc(doc(dbCloud,"users",userId),{data:db});
}

// NAV
window.nav=(x,b)=>{
 document.querySelectorAll('#home,#cats,#gastos').forEach(d=>d.classList.add('hidden'));
 document.getElementById(x).classList.remove('hidden');
}

// FORMAT
function format(n){return '$ '+(n||0).toLocaleString('es-CO');}

// CRUD
window.addCategory=()=>{
 db.cats.push({name:catName.value,value:+catValor.value||0,subs:[]});
 catName.value='';catValor.value='';
 save();render();
}

window.addSub=i=>{
 let n=prompt("Nombre");
 let v=+prompt("Valor");
 db.cats[i].subs.push({name:n,value:v});
 save();render();
}

window.addGasto=()=>{
 db.gastos.push({n:gNombre.value,v:+gValor.value});
 gNombre.value='';gValor.value='';
 save();render();
}

// EXPORTAR
window.exportCSV=()=>{
 let csv="Tipo,Nombre,Valor\n";
 db.cats.forEach(c=>{
   csv+=`Categoria,${c.name},${c.value}\n`;
   c.subs.forEach(s=>{
     csv+=`Subcategoria,${s.name},${s.value}\n`;
   });
 });
 db.gastos.forEach(g=>{
   csv+=`Gasto,${g.n},${g.v}\n`;
 });

 let blob=new Blob([csv],{type:"text/csv"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="contabilidad.csv";
 a.click();
}

// RENDER + CHART
let chart;

function render(){
 let total=0;
 let labels=[],data=[];

 categories.innerHTML='';
 db.cats.forEach((c,i)=>{
  let sum=c.value||0;
  c.subs.forEach(s=>sum+=s.value);
  total+=sum;

  labels.push(c.name);
  data.push(sum);

  let div=document.createElement('div');
  div.className='card';
  div.innerHTML=`${c.name} (${format(sum)}) <button onclick="addSub(${i})">+</button>`;
  categories.appendChild(div);
 });

 let tg=0;
 gList.innerHTML='';
 db.gastos.forEach(g=>{
  tg+=g.v;
  let li=document.createElement('li');
  li.textContent=`${g.n}: ${format(g.v)}`;
  gList.appendChild(li);
 });

 total-=tg;
 totalEl.textContent=format(total);

 if(chart)chart.destroy();
 chart=new Chart(document.getElementById('chart'),{
  type:'doughnut',
  data:{labels:labels,datasets:[{data:data}]}
 });
}

const totalEl=document.getElementById('total');

</script>

</body>
</html>
