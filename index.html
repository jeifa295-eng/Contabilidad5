<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContaApp Cloud</title>

<style>
body{margin:0;font-family:-apple-system;background:#f2f2f7}
.header{padding:20px;text-align:center;font-size:22px;font-weight:bold}
.card{background:#fff;margin:10px;border-radius:15px;padding:15px}
button{border:none;background:#007aff;color:#fff;padding:6px 10px;border-radius:8px;margin:2px}
input{padding:6px;border-radius:8px;border:1px solid #ccc;margin:5px;width:90%}
.bottom-nav{position:fixed;bottom:0;width:100%;display:flex;background:#fff;border-top:1px solid #ccc}
.bottom-nav button{flex:1;background:none;color:#007aff;padding:15px}
.hidden{display:none}
.big{font-size:24px;font-weight:bold}
</style>
</head>

<body>

<div class="header">☁️ ContaApp Cloud</div>

<div id="home">
  <div class="card">
    <div class="big">Total: <span id="total">0</span></div>
  </div>
</div>

<div id="cats" class="hidden">
  <div class="card">
    <input id="catName" placeholder="Nombre categoría">
    <input id="catValor" type="number" placeholder="Valor opcional">
    <button onclick="addCategory()">Agregar</button>
  </div>
  <div id="categories"></div>
</div>

<div id="gastos" class="hidden">
  <div class="card">
    <input id="gNombre" placeholder="Gasto">
    <input id="gValor" type="number" placeholder="Valor">
    <button onclick="addGasto()">Agregar</button>
  </div>
  <ul id="gList"></ul>
</div>

<div class="bottom-nav">
  <button onclick="nav('home')">🏠</button>
  <button onclick="nav('cats')">📂</button>
  <button onclick="nav('gastos')">💸</button>
</div>

<!-- FIREBASE -->
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyAvSqCwRrpYz58EksurH-L0P1ny_FmYWq8",
    authDomain: "contabilidad-31cc1.firebaseapp.com",
    projectId: "contabilidad-31cc1",
    storageBucket: "contabilidad-31cc1.firebasestorage.app",
    messagingSenderId: "286247305253",
    appId: "1:286247305253:web:264fb563aa930478573fcc"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
const dbCloud = getFirestore(app);

// 💰 FORMATO COP
function formatCOP(num){
  return '$ ' + num.toLocaleString('es-CO');
}

// 📦 BASE LOCAL
let db = JSON.parse(localStorage.getItem('db3')) || {cats:[], gastos:[]};

// 💾 GUARDAR LOCAL + NUBE
async function save(){
  localStorage.setItem('db3', JSON.stringify(db));

  await setDoc(doc(dbCloud, "users", "user1"), {
    data: db
  });
}

// ☁️ CARGAR DESDE NUBE
async function loadCloud(){
  try{
    const ref = doc(dbCloud, "users", "user1");
    const snap = await getDoc(ref);

    if(snap.exists()){
      db = snap.data().data;
      localStorage.setItem('db3', JSON.stringify(db));
    }
  }catch(e){
    console.log("Error nube:", e);
  }
}

// 🧭 NAVEGACIÓN
window.nav = function(x){
  document.querySelectorAll('#home,#cats,#gastos').forEach(d=>d.classList.add('hidden'));
  document.getElementById(x).classList.remove('hidden');
}

// ➕ CATEGORÍA
window.addCategory = function(){
  let n = document.getElementById('catName').value;
  let v = parseFloat(document.getElementById('catValor').value) || 0;

  if(!n) return;

  db.cats.push({name:n,value:v,subs:[],open:false});

  document.getElementById('catName').value='';
  document.getElementById('catValor').value='';

  save(); render();
}

// ➕ SUB
window.addSub = function(i){
  let n = prompt('Nombre');
  let v = parseFloat(prompt('Valor'));
  if(!n || isNaN(v)) return;

  db.cats[i].subs.push({name:n,value:v});
  save(); render();
}

// 🔽 ACORDEÓN
window.toggle = function(i){
  db.cats[i].open=!db.cats[i].open;
  render();
}

// ❌ BORRAR
window.delCat = function(i){
  db.cats.splice(i,1);
  save(); render();
}

window.delSub = function(i,j){
  db.cats[i].subs.splice(j,1);
  save(); render();
}

// 💸 GASTOS
window.addGasto = function(){
  let n = document.getElementById('gNombre').value;
  let v = parseFloat(document.getElementById('gValor').value);

  if(!n || isNaN(v)) return;

  db.gastos.push({n,v});

  document.getElementById('gNombre').value='';
  document.getElementById('gValor').value='';

  save(); render();
}

window.delGasto = function(i){
  db.gastos.splice(i,1);
  save(); render();
}

// 🎯 RENDER
function render(){
  let total = 0;
  let cont = document.getElementById('categories');
  cont.innerHTML='';

  db.cats.forEach((c,i)=>{

    let sumSubs = 0;
    c.subs.forEach(s => sumSubs += s.value);

    let totalCat = c.value + sumSubs;
    total += totalCat;

    let div = document.createElement('div');
    div.className='card';

    let h = document.createElement('h3');
    h.textContent = `${c.name} (${formatCOP(totalCat)})`;
    h.onclick = ()=>toggle(i);

    let b1 = document.createElement('button');
    b1.textContent='+';
    b1.onclick=()=>addSub(i);

    let b2 = document.createElement('button');
    b2.textContent='🗑';
    b2.onclick=()=>delCat(i);

    let ul = document.createElement('ul');
    ul.className = c.open ? '' : 'hidden';

    if(c.value>0){
      let base = document.createElement('li');
      base.textContent = `Base: ${formatCOP(c.value)}`;
      ul.appendChild(base);
    }

    c.subs.forEach((s,j)=>{
      let li = document.createElement('li');
      li.textContent = `${s.name}: ${formatCOP(s.value)}`;

      let d = document.createElement('button');
      d.textContent='❌';
      d.onclick=()=>delSub(i,j);

      li.appendChild(d);
      ul.appendChild(li);
    });

    div.appendChild(h);
    div.appendChild(b1);
    div.appendChild(b2);
    div.appendChild(ul);

    cont.appendChild(div);
  });

  let gList = document.getElementById('gList');
  gList.innerHTML='';
  let tg = 0;

  db.gastos.forEach((g,i)=>{
    tg += g.v;

    let li = document.createElement('li');
    li.textContent = `${g.n}: ${formatCOP(g.v)}`;

    let d = document.createElement('button');
    d.textContent='❌';
    d.onclick=()=>delGasto(i);

    li.appendChild(d);
    gList.appendChild(li);
  });

  document.getElementById('total').textContent = formatCOP(total - tg);
}

// 🚀 INICIO
loadCloud().then(render);

</script>

</body>
</html>
