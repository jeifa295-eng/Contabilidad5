<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContaApp PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#0f172a;color:white}
.header{padding:20px;text-align:center;background:#1e3a8a}
.card{background:#1e293b;margin:10px;padding:15px;border-radius:15px}
button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
  font-size:14px;
}
.add{background:#22c55e}
.delete{background:#ef4444}
input{
  padding:10px;
  margin:5px;
  width:90%;
  border-radius:10px;
  border:none;
  background:#334155;
  color:white
}
.hidden{display:none}
.bottom-nav{position:fixed;bottom:0;width:100%;display:flex;background:#020617}
.bottom-nav button{flex:1;background:none;color:#94a3b8;padding:15px}
.big{font-size:28px;color:#22c55e}
.error{color:#ef4444}
</style>
</head>

<body>

<div class="header">💳 ContaApp PRO</div>

<div id="login">
<div class="card">
<input id="email" placeholder="Correo">
<input id="pass" type="password" placeholder="Contraseña">
<button id="btnLogin">Entrar</button>
<button id="btnRegister">Registrarse</button>
<div id="error" class="error"></div>
</div>
</div>

<div id="mainApp" class="hidden">

<div id="home">
<div class="card"><div id="total" class="big">$0</div></div>
<div class="card"><canvas id="chart"></canvas></div>
</div>

<div id="cats" class="hidden">
<div class="card">
<input id="catName" placeholder="Categoría">
<input id="catValor" type="number" placeholder="Valor">
<button id="btnAddCat">Agregar</button>
</div>
<div id="categories"></div>
</div>

<div id="gastos" class="hidden">
<div class="card">
<input id="gNombre" placeholder="Gasto">
<input id="gValor" type="number" placeholder="Valor">
<button id="btnAddGasto">Agregar</button>
</div>
<ul id="gList"></ul>
</div>

<div class="bottom-nav">
<button data-nav="home">🏠</button>
<button data-nav="cats">📂</button>
<button data-nav="gastos">💸</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseApp = initializeApp({
 apiKey:"AIzaSyAvSqCwRrpYz58EksurH-L0P1ny_FmYWq8",
 authDomain:"contabilidad-31cc1.firebaseapp.com",
 projectId:"contabilidad-31cc1"
});

const dbCloud = getFirestore(firebaseApp);
const auth = getAuth(firebaseApp);

let userId=null;
let db={cats:[],gastos:[]};

const errorBox=document.getElementById('error');
const totalEl=document.getElementById('total');

// LOGIN
btnLogin.addEventListener("pointerup", async ()=>{
 try{
  let res=await signInWithEmailAndPassword(auth,email.value,pass.value);
  userId=res.user.uid;
 }catch(e){errorBox.textContent=e.message;}
});

// REGISTER
btnRegister.addEventListener("pointerup", async ()=>{
 try{
  let res=await createUserWithEmailAndPassword(auth,email.value,pass.value);
  userId=res.user.uid;
 }catch(e){errorBox.textContent=e.message;}
});

// AUTO LOGIN
onAuthStateChanged(auth, async user=>{
 if(user){
  userId=user.uid;
  login.style.display="none";
  mainApp.classList.remove("hidden");

  let snap=await getDoc(doc(dbCloud,"users",userId));
  if(snap.exists()) db=snap.data().data;

  render();
 }
});

// NAV
document.querySelectorAll("[data-nav]").forEach(btn=>{
 btn.addEventListener("pointerup",()=>{
  document.querySelectorAll('#home,#cats,#gastos').forEach(d=>d.classList.add('hidden'));
  document.getElementById(btn.dataset.nav).classList.remove('hidden');
 });
});

// FORMATO
function format(n){return '$ '+(n||0).toLocaleString('es-CO');}

// GUARDAR
async function save(){
 await setDoc(doc(dbCloud,"users",userId),{data:db});
}

// ➕ CATEGORIA
btnAddCat.addEventListener("pointerup",()=>{
 db.cats.push({name:catName.value,value:+catValor.value||0,subs:[],open:false});
 catName.value='';catValor.value='';
 save();render();
});

// ➕ GASTO
btnAddGasto.addEventListener("pointerup",()=>{
 db.gastos.push({n:gNombre.value,v:+gValor.value});
 gNombre.value='';gValor.value='';
 save();render();
});

// RENDER
function render(){
 categories.innerHTML='';
 let total=0;

 db.cats.forEach((c,i)=>{
  let sum=c.value||0;
  c.subs.forEach(s=>sum+=s.value);
  total+=sum;

  let div=document.createElement('div');
  div.className='card';

  let h=document.createElement('h3');
  h.textContent=`${c.name} (${format(sum)})`;

  let toggle=document.createElement('button');
  toggle.textContent=c.open?"Ocultar":"Ver";
  toggle.addEventListener("pointerup",()=>{
    c.open=!c.open; render();
  });

  let add=document.createElement('button');
  add.textContent='Agregar';
  add.className='add';
  add.addEventListener("pointerup",()=>{
    let n=prompt("Nombre");
    let v=+prompt("Valor");
    if(!n||isNaN(v))return;
    c.subs.push({name:n,value:v});
    save();render();
  });

  let delCat=document.createElement('button');
  delCat.textContent='Eliminar';
  delCat.className='delete';
  delCat.addEventListener("pointerup",()=>{
    if(confirm("Eliminar categoría?")){
      db.cats.splice(i,1);
      save();render();
    }
  });

  let ul=document.createElement('ul');
  ul.style.display=c.open?"block":"none";

  c.subs.forEach((s,j)=>{
    let li=document.createElement('li');
    li.textContent=`${s.name}: ${format(s.value)}`;

    let delSub=document.createElement('button');
    delSub.textContent='Eliminar';
    delSub.className='delete';
    delSub.addEventListener("pointerup",()=>{
      c.subs.splice(j,1);
      save();render();
    });

    li.appendChild(delSub);
    ul.appendChild(li);
  });

  div.append(h,toggle,add,delCat,ul);
  categories.appendChild(div);
 });

 // GASTOS
 let tg=0;
 gList.innerHTML='';
 db.gastos.forEach((g,i)=>{
  tg+=g.v;

  let li=document.createElement('li');
  li.textContent=`${g.n}: ${format(g.v)}`;

  let del=document.createElement('button');
  del.textContent='Eliminar';
  del.className='delete';
  del.addEventListener("pointerup",()=>{
    db.gastos.splice(i,1);
    save();render();
  });

  li.appendChild(del);
  gList.appendChild(li);
 });

 total-=tg;
 totalEl.textContent=format(total);
}

</script>

</body>
</html>
