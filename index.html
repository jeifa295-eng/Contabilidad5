<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contabilidad UltraPro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 15px;
}

.container {
  max-width: 500px;
  margin: auto;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

input { background: #1e293b; color: white; }

button {
  background: #22c55e;
  font-weight: bold;
}

.item {
  background: #1e293b;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
}

.delete { background: red; }

.secret { background: gold; color: black; }

canvas {
  margin-top: 20px;
  background: white;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🔐 Ultra Contabilidad</h2>

  <input id="titulo" placeholder="Ej: Neki">
  <input id="valor" type="number" placeholder="Valor">

  <button onclick="guardar()">Guardar</button>
  <button class="secret" onclick="modoSecreto()">Modo secreto</button>

  <h3>Total: <span id="total">----</span></h3>

  <div id="lista"></div>

  <canvas id="grafica"></canvas>
</div>

<script>
// 🔐 MAPA
const mapa = {"0":"Z","1":"P","2":"Q","3":"R","4":"S","5":"T","6":"U","7":"V","8":"W","9":"X"};
const mapaInv = {"Z":"0","P":"1","Q":"2","R":"3","S":"4","T":"5","U":"6","V":"7","W":"8","X":"9"};

function codificar(num){
  return num.toString().split("").map(n => mapa[n]).join("");
}

function decodificar(txt){
  return parseInt(txt.split("").map(c => mapaInv[c]).join(""));
}

// 🔒 estado
let verReal = false;
let chart = null;

// 💾 Guardar
function guardar(){
  const t = document.getElementById("titulo").value.trim();
  const v = document.getElementById("valor").value;

  if(!t || !v){
    alert("Completa todo");
    return;
  }

  const data = JSON.parse(localStorage.getItem("data")) || [];

  data.push({
    t: t,
    v: parseInt(v),
    c: codificar(v),
    f: Date.now()
  });

  localStorage.setItem("data", JSON.stringify(data));

  document.getElementById("titulo").value="";
  document.getElementById("valor").value="";

  cargar();
}

// 📥 Cargar
function cargar(){
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const data = JSON.parse(localStorage.getItem("data")) || [];

  let total = 0;

  data.forEach((d,i)=>{
    total += d.v;

    const fecha = new Date(d.f).toLocaleDateString();

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <strong>${d.t}</strong><br>
      📅 ${fecha}<br>
      🔐 ${d.c}
      ${verReal ? `<br>💵 ${d.v}` : ""}
      <button class="delete" onclick="eliminar(${i})">Eliminar</button>
    `;

    lista.appendChild(div);
  });

  document.getElementById("total").innerText = verReal ? total : codificar(total);

  graficar(data);
}

// 🗑️ Eliminar
function eliminar(i){
  const data = JSON.parse(localStorage.getItem("data")) || [];
  data.splice(i,1);
  localStorage.setItem("data", JSON.stringify(data));
  cargar();
}

// 🔑 Modo secreto mejorado
function modoSecreto(){
  const pass = prompt("Clave:");
  if(pass === "4321"){
    verReal = !verReal;
    cargar();
  } else {
    alert("Incorrecto");
  }
}

// 📊 Gráfica (ARREGLADA)
function graficar(data){
  const meses = Array(12).fill(0);

  data.forEach(d=>{
    const m = new Date(d.f).getMonth();
    meses[m] += d.v;
  });

  const ctx = document.getElementById("grafica").getContext("2d");

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"],
      datasets: [{
        label: "Total mensual",
        data: meses
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      }
    }
  });
}

// 🚀 iniciar
cargar();
</script>

</body>
</html>
