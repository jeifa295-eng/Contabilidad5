<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContaApp Pro</title>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --primary:#3b82f6;
  --success:#22c55e;
  --danger:#ef4444;
  --text:#f1f5f9;
  --sub:#94a3b8;
}

body{margin:0;font-family:-apple-system;background:var(--bg);color:var(--text);}

.header{
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  background:linear-gradient(90deg,#1e3a8a,#2563eb);
}

.card{
  background:var(--card);
  margin:12px;
  border-radius:18px;
  padding:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

button{
  border:none;
  padding:6px 10px;
  border-radius:10px;
  margin:3px;
  cursor:pointer;
}

button{background:var(--primary);color:white;}
button.add{background:var(--success);}
button.delete{background:var(--danger);}

input{
  padding:8px;
  border-radius:10px;
  border:none;
  margin:5px;
  width:90%;
  background:#334155;
  color:white;
}

.big{
  font-size:28px;
  font-weight:bold;
  color:#22c55e;
  transition:0.3s;
}

li{margin:6px 0;color:var(--sub);}

.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#020617;
}

.bottom-nav button{
  flex:1;
  background:none;
  color:#94a3b8;
  padding:15px;
  font-size:18px;
}

.bottom-nav button.active{
  color:white;
  background:#1e293b;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="header">💳 ContaApp Pro</div>

<div id="home">
  <div class="card">
    <div class="big" id="total">$ 0</div>
  </div>
</div>

<div id="cats" class="hidden">
  <div class="card">
    <input id="catName" placeholder="Categoría (ej: Banco)">
    <input id="catValor" type="number" placeholder="Valor">
    <button onclick="addCategory()">Agregar</button>
  </div>
  <div id="categories"></div>
</div>

<div id="gastos" class="hidden">
  <div class="card">
    <input id="gNombre" placeholder="Gasto">
    <input id="gValor" type="number" placeholder="Valor">
    <button onclick="addGasto()">Agregar</button>
  </div>
  <ul id="gList"></ul>
</div>

<div class="bottom-nav">
  <button onclick="nav('home',this)">🏠</button>
  <button onclick="nav('cats',this)">📂</button>
  <button onclick="nav('gastos',this)">💸</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAvSqCwRrpYz58EksurH-L0P1ny_FmYWq8",
  authDomain: "contabilidad-31cc1.firebaseapp.com",
  projectId: "contabilidad-31cc1",
  storageBucket: "contabilidad-31cc1.firebasestorage.app",
  messagingSenderId: "286247305253",
  appId: "1:286247305253:web:264fb563aa930478573fcc"
};

const app = initializeApp(firebaseConfig);
const dbCloud = getFirestore(app);

function formatCOP(num){
  return '$ ' + (num||0).toLocaleString('es-CO');
}

let db={cats:[],gastos:[]};

async function loadCloud(){
  const snap=await getDoc(doc(dbCloud,"conta","data"));
  if(snap.exists()) db=snap.data().data;
}

async function save(){
  await setDoc(doc(dbCloud,"conta","data"),{data:db});
}

// NAV
window.nav=function(x,btn){
  document.querySelectorAll('#home,#cats,#gastos').forEach(d=>d.classList.add('hidden'));
  document.getElementById(x).classList.remove('hidden');

  document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// ICONOS AUTOMÁTICOS
function icono(nombre){
  nombre=nombre.toLowerCase();
  if(nombre.includes("banco")) return "🏦";
  if(nombre.includes("efectivo")) return "💵";
  if(nombre.includes("crypto")) return "🪙";
  if(nombre.includes("ahorro")) return "💰";
  return "📁";
}

// CATEGORIA
window.addCategory=function(){
  let n=catName.value;
  let v=parseFloat(catValor.value)||0;
  if(!n) return;

  db.cats.push({name:n,value:v,subs:[],open:false});
  catName.value='';catValor.value='';
  save();render(true);
}

// SUB
window.addSub=function(i){
  let n=prompt("Nombre");
  let v=parseFloat(prompt("Valor"));
  if(!n||isNaN(v)) return;
  db.cats[i].subs.push({name:n,value:v});
  save();render(true);
}

// TOGGLE
window.toggle=function(i){
  db.cats[i].open=!db.cats[i].open;
  render();
}

// BORRAR
window.delCat=i=>{db.cats.splice(i,1);save();render(true);}
window.delSub=(i,j)=>{db.cats[i].subs.splice(j,1);save();render(true);}

// GASTOS
window.addGasto=function(){
  let n=gNombre.value;
  let v=parseFloat(gValor.value);
  if(!n||isNaN(v)) return;
  db.gastos.push({n,v});
  gNombre.value='';gValor.value='';
  save();render(true);
}

window.delGasto=i=>{db.gastos.splice(i,1);save();render(true);}

// ANIMACION TOTAL
function animarTotal(el){
  el.style.transform="scale(1.1)";
  setTimeout(()=>el.style.transform="scale(1)",200);
}

// RENDER
function render(anim=false){
  let total=0;
  categories.innerHTML='';

  db.cats.forEach((c,i)=>{
    let sumSubs=0;
    c.subs.forEach(s=>sumSubs+=s.value);

    let totalCat=c.value+sumSubs;
    total+=totalCat;

    let div=document.createElement('div');
    div.className='card';

    let h=document.createElement('h3');
    h.textContent=`${icono(c.name)} ${c.name} (${formatCOP(totalCat)})`;
    h.onclick=()=>toggle(i);

    let add=document.createElement('button');
    add.textContent='➕';add.className='add';
    add.onclick=()=>addSub(i);

    let del=document.createElement('button');
    del.textContent='🗑';del.className='delete';
    del.onclick=()=>delCat(i);

    let ul=document.createElement('ul');
    ul.className=c.open?'':'hidden';

    if(c.value>0){
      let base=document.createElement('li');
      base.textContent=`Base: ${formatCOP(c.value)}`;
      ul.appendChild(base);
    }

    c.subs.forEach((s,j)=>{
      let li=document.createElement('li');
      li.textContent=`${s.name}: ${formatCOP(s.value)}`;

      let d=document.createElement('button');
      d.textContent='❌';d.className='delete';
      d.onclick=()=>delSub(i,j);

      li.appendChild(d);
      ul.appendChild(li);
    });

    div.append(h,add,del,ul);
    categories.appendChild(div);
  });

  let tg=0;
  gList.innerHTML='';
  db.gastos.forEach((g,i)=>{
    tg+=g.v;
    let li=document.createElement('li');
    li.textContent=`${g.n}: ${formatCOP(g.v)}`;

    let d=document.createElement('button');
    d.textContent='❌';d.className='delete';
    d.onclick=()=>delGasto(i);

    li.appendChild(d);
    gList.appendChild(li);
  });

  let final=total-tg;
  totalEl.textContent=formatCOP(final);

  if(anim) animarTotal(totalEl);
}

const totalEl=document.getElementById('total');

loadCloud().then(()=>render());

</script>

</body>
</html>
